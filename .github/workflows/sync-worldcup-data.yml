name: Sync World Cup 2026 data (mirror + CSV build)

on:
  schedule:
    # Runs every 15 minutes (UTC). GitHub may delay this a few minutes during
    # high load, but it will never run more often than the cron says.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can push the updated CSVs/JSON

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch source JSON + rebuild CSVs
        run: python scripts/fetch_and_convert.py

      - name: Commit and push if data changed
        run: |
          git config user.name "worldcup-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-sync World Cup 2026 data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
